; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32H750VB]
platform = ststm32
board = genericSTM32H750VB
framework = stm32cube

upload_protocol = dfu

; Filter sources
build_src_filter =
    +<**/*.cpp>
    +<**/*.c>
    -<usbd_conf_template.c>
    -<usbd_cdc_if_template.c>
    -<usbd_desc_template.c>
; Include paths
build_flags =
    -I Core/Inc
    -I USB_DEVICE/App
    -I USB_DEVICE/Target
    -I Middlewares/ST/STM32_USB_Device_Library/Core/Inc
    -I Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc
    -I Drivers/STM32H7xx_HAL_Driver/Inc  ; HAL driver headers (bundled)
    -I Drivers/CMSIS/Device/ST/STM32H7xx/Include  ; CMSIS device headers
    -I Drivers/CMSIS/Include  ; CMSIS core headers
    -D USE_HAL_DRIVER
    -D HSE_VALUE=25000000  ; Match your CubeMX clock (e.g., 8 MHz HSE)
    -D STM32H750xx